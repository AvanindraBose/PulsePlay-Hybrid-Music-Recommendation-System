name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint GitHub Actions workflow
        uses: raven-actions/actionlint@v2

  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      ml: ${{ steps.filter.outputs.ml }}
      container: ${{ steps.filter.outputs.container }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'tests/api/**'
              - 'tests/conftest.py'
              - 'pyproject.toml'
              - 'uv.lock'
            ml:
              - 'src/**'
              - 'data/**'
              - 'dvc.yaml'
              - 'dvc.lock'
              - 'Script/hybrid_recommendation.py'
              - 'Script/recommender_script.py'
              - 'tests/recommendation-engine/**'
              - 'pyproject.toml'
              - 'uv.lock'
            container:
              - 'Dockerfile'
              - 'docker-compose.yaml'
              - '.dockerignore'

  model-tests:
    needs: changes
    if: needs.changes.outputs.ml == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.4"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: 0.11.6

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: uv sync --extra test

      - name: Run model tests
        run: uv run pytest tests/recommendation-engine -q

  api-tests:
    needs: changes
    if: |
      needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pulse_play_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d pulse_play_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/pulse_play_test
      JWT_ACCESS_SECRET_KEY: ci-access-secret
      JWT_REFRESH_SECRET_KEY: ci-refresh-secret
      REDIS_URL: redis://127.0.0.1:6379/0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.4"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: 0.11.6

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: uv sync --extra test

      - name: Run unit tests
        run: uv run pytest tests/api/unit -q

      - name: Run integration tests
        run: uv run pytest tests/api/integration -q

      - name: Upload API test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-logs
          path: logs/

  ml-pipeline:
    needs: changes
    if: (github.event_name == 'push') && (github.ref == 'refs/heads/main') && (needs.changes.outputs.ml == 'true')
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.4"

      - name: install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: 0.11.6

      - name: cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: install dependencies
        run: uv sync --extra test --extra pipeline
    
      - name: pull dvc data
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_DVC_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_DVC_SECRET_ACCESS_KEY }}
        run: |
            uv run dvc pull data/raw/songs-info.csv
            uv run dvc pull data/raw/user-info.csv

      - name: run dvc pipeline
        run: uv run dvc repro

      - name: run model tests
        run: uv run pytest tests/recommendation-engine -q
       
      - name: Upload DVC outputs
        uses: actions/upload-artifact@v4
        with:
            name: dvc-outputs
            path: |
                data/cleaned/
                data/processed/
                models/
                dvc.lock

  post-pipeline-api-checks:
    needs: ml-pipeline
    if: |
      needs.ml-pipeline.result == 'success'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pulse_play_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d pulse_play_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/pulse_play_test
      JWT_ACCESS_SECRET_KEY: ci-access-secret
      JWT_REFRESH_SECRET_KEY: ci-refresh-secret
      REDIS_URL: redis://127.0.0.1:6379/0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.4"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: 0.11.6

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: uv sync --extra test

      - name: Run unit tests
        run: uv run pytest tests/api/unit -q

      - name: Run integration tests
        run: uv run pytest tests/api/integration -q

      - name: Upload API test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-logs
          path: logs/

  dockerizing-api:
    needs:
      - changes
      - post-pipeline-api-checks
    if: always() && 
        (github.event_name == 'push') &&
        (github.ref == 'refs/heads/main') && 
        (
          needs.post-pipeline-api-checks.result == 'success' || 
          needs.changes.outputs.container == 'true'
        )
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
    
      - name: Upload Artifacts
        uses: actions/download-artifact@v4
        with:
            name: dvc-outputs
            path: .

      - name: login to docker
        if: success()
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
      
      - name: Build Docker Image
        if: success()
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/twitter-sentiment-analysis-api:${{ github.sha }} \
                       -t ${{ secrets.DOCKERHUB_USERNAME }}/twitter-sentiment-analysis-api:latest .
      
      - name: Push Docker Image to DockerHub
        if: success()
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/twitter-sentiment-analysis-api:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/twitter-sentiment-analysis-api:latest

  pushing-dvc-artifacts:
    needs: 
        - ml-pipeline
        - post-pipeline-api-checks
        - dockerizing-api
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.ml-pipeline.result == 'success' &&
      needs.post-pipeline-api-checks.result == 'success' &&
      needs.dockerizing-api.result == 'success'

    runs-on: 'ubuntu-latest'

    steps: 
        - name: checkout-code
          uses: actions/checkout@v4

        - name: Setup Python
          uses: actions/setup-python@v5
          with:
            python-version: "3.11.4"

        - name: Install uv
          uses: astral-sh/setup-uv@v5
          with:
            version: 0.11.6
        
        - name: Cache uv dependencies
          uses: actions/cache@v4
          with:
            path: ~/.cache/uv
            key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
            restore-keys: |
                ${{ runner.os }}-uv-

        - name: Install dependencies
          run: uv sync --extra pipeline
        
        - name: Download DVC Outputs
          uses: actions/download-artifact@v4
          with:
            name: dvc-outputs
            path: .
        
        - name: Configure AWS S3 for DVC Artifacts
          run: |
            dvc remote modify origin access_key_id ${{ secrets.AWS_DVC_ACCESS_KEY_ID }}
            dvc remote modify origin secret_access_key ${{ secrets.AWS_DVC_SECRET_ACCESS_KEY }}
        
        - name: Push DVC Artifacts
          run: |
            uv run dvc push
        
            

