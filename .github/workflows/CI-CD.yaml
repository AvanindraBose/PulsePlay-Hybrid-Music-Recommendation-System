name: CI-Pipeline

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - main
  # workflow_dispatch:

jobs:

  ci-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint GitHub Actions workflow
        uses: raven-actions/actionlint@v2

  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      ml: ${{ steps.filter.outputs.ml }}
      container: ${{ steps.filter.outputs.container }}
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'tests/api/**'
              - 'tests/conftest.py'
              - 'pyproject.toml'
              - 'uv.lock'
            ml:
              - 'src/**'
              - 'data/**'
              - 'dvc.yaml'
              - 'dvc.lock'
              - 'params.yaml'
              - 'Prod-Script/**'
              - 'tests/model/**'
              - 'pyproject.toml'
              - 'uv.lock'
            container:
              - 'Dockerfile'
              - 'docker-compose.yaml'
              - '.dockerignore'
              - '.github/ecs/**'


