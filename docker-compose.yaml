name: Pulse-Play-Hybrid-Recommender-System

services:
  # mention all the services that will be used by the Application.
  api:
    build:
      context: .
      dockerfile: dockerfile
    container_name: fast-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - backend
    volumes:
      - ./logs:/app/logs

  redis:
    image: redis:alpine
    container_name: redis1
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 30s
      retries: 10
    networks:
      - backend


networks:
  backend:
    driver: bridge
      


      
